<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="32" fill="#111827"/>
  <!-- Popcorn bucket -->
  <g transform="translate(96,96)">
    <!-- Bucket body -->
    <polygon points="-32,10 32,10 24,58 -24,58" fill="#ef4444"/>
    <!-- Bucket stripes -->
    <polygon points="-10,10 -2,10 -8,58 -16,58" fill="#fef2f2" opacity="0.3"/>
    <polygon points="10,10 18,10 12,58 4,58" fill="#fef2f2" opacity="0.3"/>
    <!-- Popcorn pieces -->
    <circle cx="-20" cy="-2" r="12" fill="#fef3c7"/>
    <circle cx="0" cy="-8" r="13" fill="#fef3c7"/>
    <circle cx="20" cy="-2" r="12" fill="#fef3c7"/>
    <circle cx="-10" cy="-14" r="11" fill="#fffbeb"/>
    <circle cx="10" cy="-16" r="10" fill="#fffbeb"/>
    <!-- Popcorn texture dots -->
    <circle cx="-20" cy="-2" r="5" fill="#fde68a"/>
    <circle cx="0" cy="-8" r="6" fill="#fde68a"/>
    <circle cx="20" cy="-2" r="5" fill="#fde68a"/>
    <circle cx="-10" cy="-14" r="4" fill="#fde68a"/>
    <circle cx="10" cy="-16" r="4" fill="#fde68a"/>
  </g>
</svg>
